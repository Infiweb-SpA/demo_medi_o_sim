{% extends "base.html" %}

{% block title %}Contacto - The Clinical Atelier{% endblock %}

{% block content %}

<section class="contact-section">
    <div class="contact-header">
        <h1>Contacta con Nosotros</h1>
        <p style="color: #666;">Estamos aquí para responder tus preguntas y ayudarte a programar tu visita.</p>
    </div>

    <div class="contact-form">
        <form method="POST" action="/contact">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Asunto</label>
                <select id="subject" name="subject" required>
                    <option value="">Selecciona un asunto</option>
                    <option value="Consulta General">Consulta General</option>
                    <option value="Urgencia">Urgencia</option>
                    <option value="Información de Servicios">Información de Servicios</option>
                    <option value="Precios y Pagos">Precios y Pagos</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Mensaje</label>
                <textarea id="message" name="message" placeholder="¿Cómo podemos ayudarte?" required></textarea>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
                Enviar Mensaje
            </button>
        </form>
    </div>
</section>

{% endblock %}
